name: Mise à jour des utilisateurs

# Déclenché depuis la page admin via l'API GitHub Actions
on:
  workflow_dispatch:
    inputs:
      users_json:
        description: 'JSON des utilisateurs (tableau PED_USERS)'
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Mettre à jour PED_USERS dans data.js
        run: |
          # Lire le contenu actuel de data.js
          CONTENT=$(cat data.js)

          # Construire le nouveau bloc PED_USERS
          NEW_BLOCK="const PED_USERS = ${{ inputs.users_json }};"

          # Remplacer le bloc existant avec python (plus fiable que sed pour du JSON)
          python3 - << 'PYEOF'
          import re, os

          with open('data.js', 'r', encoding='utf-8') as f:
              content = f.read()

          users_json = os.environ['USERS_JSON']
          new_block  = f'const PED_USERS = {users_json};'

          # Regex : correspond à const PED_USERS = [...];  (multiligne)
          pattern = r'const\s+PED_USERS\s*=\s*\[[\s\S]*?\];'
          updated = re.sub(pattern, new_block, content)

          with open('data.js', 'w', encoding='utf-8') as f:
              f.write(updated)

          print("data.js mis à jour avec succès")
          PYEOF
        env:
          USERS_JSON: ${{ inputs.users_json }}

      - name: Committer et pousser
        run: |
          git config user.name  "Info PED Admin"
          git config user.email "admin@infoped.local"
          git add data.js
          # Ne committer que s'il y a des changements
          git diff --staged --quiet || git commit -m "👥 Mise à jour utilisateurs via page admin"
          git push
