<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info PED — 🦠 Hygiène</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:#FF6B9D; --primary-dark:#C94A6D;
            --accent:#764ba2;  --accent2:#667eea;
            --sidebar-w:240px;
            --bg:#f0f2f5; --surface:#ffffff;
            --border:#e5e7eb; --text:#1a1a2e; --text-muted:#6b7280;
            --shadow-xs:0 1px 3px rgba(0,0,0,0.05);
            --shadow-sm:0 2px 8px rgba(0,0,0,0.07);
            --shadow-md:0 4px 20px rgba(0,0,0,0.09);
            --shadow-lg:0 8px 40px rgba(0,0,0,0.12);
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
        @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
        @keyframes rotate{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
        @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
        html,body{height:100%;}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;}

        /* Sidebar */
        .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:linear-gradient(180deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);display:flex;flex-direction:column;z-index:200;box-shadow:4px 0 24px rgba(0,0,0,0.2);}
        .sidebar-brand{padding:26px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.07);}
        .brand-inner{display:flex;align-items:center;gap:12px;text-decoration:none;}
        .brand-icon{width:42px;height:42px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,#FF6B9D,#764ba2);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 14px rgba(255,107,157,0.4);}
        .brand-name{font-family:'Sora',sans-serif;font-size:15px;font-weight:800;color:white;}
        .brand-sub{font-size:11px;color:rgba(255,255,255,0.35);margin-top:1px;}
        .sidebar-section-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.25);text-transform:uppercase;letter-spacing:1.2px;padding:18px 20px 7px;}
        .sidebar-nav{flex:1;padding:8px 12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
        .nav-item{display:flex;align-items:center;gap:11px;padding:10px 14px;border-radius:10px;text-decoration:none;color:rgba(255,255,255,0.5);font-size:13.5px;font-weight:500;transition:all 0.18s;}
        .nav-item:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85);}
        .nav-item.active{background:linear-gradient(135deg,rgba(255,107,157,0.2),rgba(118,75,162,0.15));color:white;font-weight:600;box-shadow:inset 0 0 0 1px rgba(255,107,157,0.25);}
        .nav-icon{font-size:17px;width:22px;text-align:center;flex-shrink:0;}
        .sidebar-bottom{padding:14px 12px;border-top:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;gap:4px;}
        .sidebar-home{display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:10px;text-decoration:none;color:rgba(255,255,255,0.4);font-size:13px;font-weight:500;transition:all 0.18s;margin-bottom:4px;}
        .sidebar-home:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.8);}
        .user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.06);margin-bottom:6px;}
        .user-ava{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#FF6B9D,#764ba2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
        .user-name{font-size:13px;font-weight:600;color:white;}
        .user-role{font-size:11px;color:rgba(255,255,255,0.35);margin-top:1px;}
        .sidebar-btn{display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:10px;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.18s;font-family:'DM Sans',sans-serif;text-align:left;width:100%;color:rgba(255,255,255,0.45);background:transparent;}
        .sidebar-btn:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.8);}
        .btn-edit-side{display:none;}
        .btn-edit-side.active{color:#FFE66D;background:rgba(255,230,109,0.1);}
        .btn-logout-side:hover{background:rgba(255,107,157,0.12);color:#FF6B9D;}

        /* Main */
        .main-content{margin-left:var(--sidebar-w);flex:1;min-height:100vh;background:var(--bg);}
        .main-inner{padding:32px 36px 80px;max-width:1100px;}

        /* Header page */
        .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;animation:fadeInUp 0.5s ease-out;gap:16px;flex-wrap:wrap;}
        .page-header-left{}
        .page-eyebrow{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
        .page-h1{font-family:'Sora',sans-serif;font-size:clamp(24px,3vw,34px);font-weight:800;color:var(--text);display:flex;align-items:center;gap:12px;}
        .page-h1-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
        .page-count{font-size:13px;color:var(--text-muted);margin-top:5px;}
        .page-header-right{display:flex;gap:10px;align-items:center;}
        .btn-edit-page{display:none;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--accent2);border:1.5px solid rgba(102,126,234,0.25);}
        .btn-edit-page:hover{background:rgba(102,126,234,0.06);border-color:var(--accent2);}
        .btn-edit-page.active{background:rgba(255,230,109,0.1);color:#92400e;border-color:rgba(245,166,35,0.4);}

        /* Carte contenu */
        .content-card{background:var(--surface);border-radius:18px;border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow:hidden;animation:fadeInUp 0.5s ease-out 0.1s backwards;}
        .card-stripe{height:5px;width:100%;}
        .card-inner{padding:24px 28px;}

        /* Liste */
        ul.item-list{list-style:none;padding:0;}
        ul.item-list li{padding:13px 0;font-size:14.5px;color:var(--text);position:relative;padding-left:20px;border-bottom:1px solid #f3f4f6;transition:all 0.15s;line-height:1.5;}
        ul.item-list li:last-child{border-bottom:none;}
        ul.item-list li::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:var(--primary);}
        ul.item-list li:hover{padding-left:26px;}
        ul.item-list li.with-button{display:flex;justify-content:space-between;align-items:center;}
        ul.item-list li.with-button a button{background:rgba(255,107,157,0.08);border:none;border-radius:20px;color:var(--primary);font-weight:600;font-size:12px;padding:5px 12px;cursor:pointer;transition:all 0.2s;}
        ul.item-list li.with-button a button:hover{background:rgba(255,107,157,0.18);}
        .alert-item{background:rgba(255,107,157,0.06);border-left:3px solid var(--primary);padding:12px 16px 12px 14px !important;border-radius:8px;margin:6px 0;display:flex;align-items:center;gap:10px;}
        .alert-item::before{display:none;}
        .alert-item .icon{font-size:18px;flex-shrink:0;}

        /* Agenda */
        .agenda-list{display:flex;flex-direction:column;gap:10px;}
        .agenda-item{background:var(--bg);border-radius:14px;border:1px solid var(--border);overflow:hidden;transition:all 0.2s;}
        .agenda-item:hover{background:white;box-shadow:var(--shadow-sm);}
        .agenda-header{display:flex;align-items:center;gap:16px;padding:16px 20px;cursor:pointer;}
        .agenda-date{width:52px;height:52px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,#FF6B9D,#764ba2);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(255,107,157,0.25);}
        .agenda-date .day{font-family:'Sora',sans-serif;font-size:20px;font-weight:800;color:white;line-height:1;}
        .agenda-date .month{font-size:9px;font-weight:700;color:rgba(255,255,255,0.8);text-transform:uppercase;}
        .agenda-main{flex:1;display:flex;justify-content:space-between;align-items:center;}
        .agenda-content{font-size:15px;font-weight:600;color:var(--text);}
        .agenda-arrow{font-size:18px;color:var(--text-muted);transition:transform 0.3s;}
        .agenda-item.expanded .agenda-arrow{transform:rotate(90deg);}
        .agenda-details{max-height:0;overflow:hidden;transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1),opacity 0.3s;opacity:0;}
        .agenda-item.expanded .agenda-details{max-height:300px;opacity:1;}
        .agenda-details-content{padding:0 20px 16px;display:flex;flex-direction:column;gap:8px;}
        .detail-row{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--text);}
        .detail-icon{font-size:15px;width:22px;text-align:center;flex-shrink:0;}
        .detail-label{font-weight:600;min-width:90px;color:var(--text-muted);}
        .detail-value{color:var(--text);}

        /* Mode édition */
        body.edit-mode .content-card{outline:2px dashed rgba(255,107,157,0.4);outline-offset:2px;}
        body.edit-mode .agenda-item{outline:1px dashed rgba(255,107,157,0.3);outline-offset:1px;}
        .edit-actions{display:none;position:absolute;right:6px;top:50%;transform:translateY(-50%);gap:4px;z-index:10;}
        body.edit-mode ul.item-list li{padding-right:74px;}
        body.edit-mode .edit-actions{display:flex;}
        .eact{width:28px;height:28px;border:none;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
        .eact-e{background:rgba(78,205,196,0.15);color:#0f7b6c;}
        .eact-e:hover{background:rgba(78,205,196,0.35);transform:scale(1.1);}
        .eact-d{background:rgba(255,107,157,0.12);color:var(--primary-dark);}
        .eact-d:hover{background:rgba(255,107,157,0.3);transform:scale(1.1);}
        .agenda-edit-btns{display:none;gap:5px;}
        body.edit-mode .agenda-edit-btns{display:flex;}
        .add-btn{display:none;width:100%;padding:11px;margin-bottom:14px;border:1.5px dashed rgba(255,107,157,0.4);border-radius:10px;background:rgba(255,107,157,0.04);color:var(--primary);font-weight:600;font-size:13.5px;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
        .add-btn:hover{background:rgba(255,107,157,0.1);}
        .empty-state{color:var(--text-muted);font-size:13px;font-style:italic;padding:8px 0;}

        /* Info bas */
        #last-update{position:fixed;bottom:20px;left:calc(var(--sidebar-w) + 20px);background:white;border:1px solid var(--border);padding:8px 16px;border-radius:20px;font-size:12px;font-weight:500;color:var(--text-muted);box-shadow:var(--shadow-xs);z-index:100;display:flex;align-items:center;gap:6px;}
        #last-update .dot{width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0;}
        #last-update span{color:var(--primary);font-weight:600;}

        .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:white;padding:10px 20px;border-radius:20px;font-weight:600;font-size:13px;box-shadow:var(--shadow-lg);opacity:0;transition:all 0.3s;z-index:2000;pointer-events:none;white-space:nowrap;}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

        @media(max-width:768px){
            :root{--sidebar-w:64px;}
            .brand-name,.brand-sub,.nav-item span:not(.nav-icon),.user-name,.user-role,.sidebar-btn span:last-child,.sidebar-home span:last-child{display:none;}
            .sidebar-brand{padding:16px 11px;}
            .nav-item{padding:11px;justify-content:center;}
            .sidebar-bottom{padding:10px;}
            .user-card{justify-content:center;}
            .main-inner{padding:20px 16px 60px;}
            #last-update{left:80px;}
        }

        

        

        /* ── Sidebar collapse button ── */
        .sidebar { overflow:hidden; transition:width 0.28s cubic-bezier(0.4,0,0.2,1); }
        .sidebar-brand { position:relative; padding-bottom:12px; }
        .sb-toggle {
            position:absolute; bottom:-12px; right:16px;
            width:24px; height:24px; border-radius:50%;
            background:#fff; border:1px solid rgba(0,0,0,0.1);
            box-shadow:0 2px 8px rgba(0,0,0,0.15);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; z-index:10; transition:all 0.22s;
            color:#9ca3af; padding:0;
        }
        .sb-toggle:hover { box-shadow:0 3px 12px rgba(0,0,0,0.25); color:#374151; transform:scale(1.1); }
        .sb-toggle svg { transition:transform 0.28s cubic-bezier(0.4,0,0.2,1); }
        .sidebar.collapsed { width:64px; }
        .sidebar.collapsed .sb-toggle { right:50%; transform:translateX(50%); }
        .sidebar.collapsed .sb-toggle:hover { transform:translateX(50%) scale(1.1); }
        .sidebar.collapsed .sb-toggle svg { transform:rotate(180deg); }
        /* Masquer tout le texte — garder uniquement les icônes */
        .sidebar.collapsed .brand-name,
        .sidebar.collapsed .brand-sub,
        .sidebar.collapsed .nav-label,
        .sidebar.collapsed .nav-item span:not(.nav-icon),
        .sidebar.collapsed .user-name,
        .sidebar.collapsed .user-role,
        .sidebar.collapsed .sidebar-section-label,
        .sidebar.collapsed .sidebar-btn span:not(:first-child) { display:none; }
        .sidebar.collapsed .brand-inner { justify-content:center; }
        .sidebar.collapsed .nav-item { justify-content:center; padding:11px 8px; }
        .sidebar.collapsed .user-card { justify-content:center; }
        .sidebar.collapsed .sidebar-btn { justify-content:center; padding:10px 8px; }
        .main-content,.main,.topbar { transition:margin-left 0.28s cubic-bezier(0.4,0,0.2,1),left 0.28s cubic-bezier(0.4,0,0.2,1); }
        body.sb-on .main-content { margin-left:64px !important; }
        body.sb-on .main { margin-left:64px !important; }
        body.sb-on .topbar { left:64px !important; }
        body.sb-on #last-update { left:80px !important; }

    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <a class="brand-inner" href="index.html">
                <div class="brand-icon">🏥</div>
                <div><div class="brand-name">Les InfoPED</div><div class="brand-sub">Pédiatrie · Urgences</div></div>
            </a>
            <button class="sb-toggle" onclick="toggleSidebar()" title="Réduire / Agrandir"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        </div>
        <div class="sidebar-section-label">Menu</div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span class="nav-label">Accueil</span></a>
            <a href="therapeutique.html" class="nav-item"><span class="nav-icon">💊</span><span class="nav-label">Thérapeutique</span></a>
            <a href="organisation.html" class="nav-item"><span class="nav-icon">📌</span><span class="nav-label">Organisation &amp; Pratique</span></a>
            <a href="projets.html" class="nav-item"><span class="nav-icon">💡</span><span class="nav-label">Projets</span></a>
            <a href="hygiene2.html" class="nav-item active"><span class="nav-icon">🦠</span><span class="nav-label">Hygiène</span></a>
            <a href="divers.html" class="nav-item"><span class="nav-icon">📁</span><span class="nav-label">Administratif &amp; Divers</span></a>
            <a href="rh.html" class="nav-item"><span class="nav-icon">👥</span><span class="nav-label">RH</span></a>
            <a href="evenements.html" class="nav-item"><span class="nav-icon">🎉</span><span class="nav-label">Évènements de l'équipe</span></a>
            <a href="agenda.html" class="nav-item"><span class="nav-icon">📆</span><span class="nav-label">Agenda</span></a>
        </nav>        <div class="sidebar-bottom">
            <div class="user-card">
                <div class="user-ava" id="userAvatar">👤</div>
                <div><div class="user-name" id="userName">—</div><div class="user-role" id="userRole">—</div></div>
            </div>
            <button class="sidebar-btn btn-edit-side" id="editBtn" onclick="toggleEdit()">
                <span>✏️</span><span id="editBtnLabel">Mode édition</span>
            </button>
            <button class="sidebar-btn btn-logout-side" onclick="pedLogout()">
                <span>🚪</span><span>Déconnexion</span>
            </button>
        </div>
    </aside>

    <main class="main-content">
        <div class="main-inner">
            <div class="page-header">
                <div class="page-header-left">
                    <div class="page-eyebrow">Info PED</div>
                    <h1 class="page-h1">🦠 Hygiène</h1>
                    <div class="page-count" id="pageCount">—</div>
                </div>
                <div class="page-header-right">
                    <button class="btn-edit-page" id="editBtnTop" style="display:none" onclick="toggleEdit()">
                        ✏️ <span id="editBtnTopLabel">Mode édition</span>
                    </button>
                </div>
            </div>

            <div class="content-card">
                <div class="card-stripe" style="background:linear-gradient(90deg,#FF6B9D,#FFB4D6)"></div>
                <div class="card-inner">

            <button class="add-btn" id="addItemBtn" style="display:none" onclick="pedOpenAddItem('medicaments')">+ Ajouter un élément</button>
            <ul class="item-list" id="list-medicaments"></ul>
                </div>
            </div>
        </div>
    </main>

    <div id="last-update"><span class="dot"></span>Mis à jour le <span id="lastModified">—</span></div>
    <div class="toast" id="pedToast"></div>

    <script src="data.js"></script>
    <script src="shared.js"></script>
    <script>
    const currentUser = pedGetUser();
    if (!currentUser) window.location.replace('login.html');

    let isEditMode = false;
    let localContent = null, localAgenda = null;

    document.addEventListener('DOMContentLoaded', function() {
        const isAdmin = currentUser.role === 'admin';
        document.getElementById('userName').textContent   = currentUser.username;
        document.getElementById('userAvatar').textContent = isAdmin ? '👑' : (currentUser.role === 'guest' ? '👁️' : '👤');
        document.getElementById('userRole').textContent   = isAdmin ? 'Administrateur' : (currentUser.role === 'guest' ? 'Invité' : 'Utilisateur');

        const ds = typeof PED_LAST_UPDATE !== 'undefined' ? PED_LAST_UPDATE : '—';
        document.getElementById('lastModified').textContent = ds;

        if (isAdmin) {
            document.getElementById('editBtn').style.display = 'flex';
            document.getElementById('editBtnTop').style.display = 'flex';
        }

        localContent = JSON.parse(JSON.stringify(PED_CONTENT));
        if (!localContent.evenements)       localContent.evenements = [];
        if (!localContent.hygiene)           localContent.hygiene = [];
        if (!localContent.medicaments_med)        localContent.medicaments_med = [];
        if (!localContent.medicaments_dm)         localContent.medicaments_dm = [];
        if (!localContent.medicaments_protocoles) localContent.medicaments_protocoles = [];
        if (!localContent.hygiene_htc)      localContent.hygiene_htc = [];
        if (!localContent.hygiene_urgence)  localContent.hygiene_urgence = [];
        if (!localContent.hygiene_pedopsy)  localContent.hygiene_pedopsy = [];
        localAgenda  = JSON.parse(JSON.stringify(PED_AGENDA || []));
        pedInitEdit(localContent, localAgenda, renderPage);
        renderPage();

        // Compteur
        const cnt = (localContent["hygiene"]||[]).length; document.getElementById("pageCount").textContent = cnt + " information" + (cnt > 1 ? "s" : "");
    });

    function renderPage() {
        const isAdmin = currentUser.role === 'admin' && isEditMode;
        pedRenderSection('list-hygiene', localContent['hygiene']||[], isAdmin, 'hygiene', null);
    }

    function toggleEdit() {
        isEditMode = !isEditMode;
        document.body.classList.toggle('edit-mode', isEditMode);
        const lbl  = isEditMode ? '✅ Terminer' : '✏️ Mode édition';
        const lbl2 = isEditMode ? '✅ Terminer' : 'Mode édition';
        document.getElementById('editBtn').classList.toggle('active', isEditMode);
        document.getElementById('editBtnTop').classList.toggle('active', isEditMode);
        document.getElementById('editBtnLabel').textContent    = lbl2;
        document.getElementById('editBtnTopLabel').textContent = lbl2;
        const addBtn = document.getElementById('addItemBtn') || document.getElementById('addAgendaBtn');
        if (addBtn) addBtn.style.display = isEditMode ? 'block' : 'none';
        renderPage();
        if (isEditMode) pedToast('✏️ Mode édition activé');
    }

    // ── Sidebar collapse ─────────────────────────────
    function toggleSidebar() {
        const sb = document.getElementById('sidebar');
        if (!sb) return;
        const col = sb.classList.toggle('collapsed');
        document.body.classList.toggle('sb-on', col);
        try { localStorage.setItem('ped_sb', col ? '1' : '0'); } catch(e) {}
    }
    (function(){
        try {
            if (localStorage.getItem('ped_sb') === '1') {
                const sb = document.getElementById('sidebar');
                if (sb) { sb.classList.add('collapsed'); document.body.classList.add('sb-on'); }
            }
        } catch(e) {}
    })();

    </script>
</body>
</html>
