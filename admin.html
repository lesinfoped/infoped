<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info PED – Administration</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary:#FF6B9D; --primary-dark:#C94A6D;
            --secondary:#4ECDC4; --accent:#FFE66D;
            --dark:#1A1A2E;
            --shadow-md:0 8px 24px rgba(0,0,0,0.12);
            --shadow-lg:0 16px 48px rgba(0,0,0,0.18);
        }
        * { margin:0; padding:0; box-sizing:border-box; }

        @keyframes gradientShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
        @keyframes spin{to{transform:rotate(360deg);}}
        @keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.04);}100%{transform:scale(1);}}

        body {
            font-family:'DM Sans',sans-serif;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);
            background-size:400% 400%; animation:gradientShift 15s ease infinite;
            min-height:100vh; padding:88px 20px 60px;
        }

        /* ── Topbar ── */
        .topbar {
            position:fixed; top:0; left:0; right:0; z-index:300;
            background:rgba(26,26,46,0.8); backdrop-filter:blur(20px);
            border-bottom:1px solid rgba(255,255,255,0.1);
            display:flex; align-items:center; justify-content:space-between;
            padding:0 28px; height:64px;
        }
        .topbar-title { font-family:'Sora',sans-serif; font-size:19px; font-weight:700; color:white; display:flex; align-items:center; gap:12px; }
        .admin-chip { background:linear-gradient(135deg,#667eea,#764ba2); color:white; font-size:11px; font-weight:700; padding:3px 10px; border-radius:50px; }
        .topbar-btns { display:flex; gap:10px; }
        .tb-btn { padding:9px 20px; border-radius:50px; border:none; font-weight:700; font-size:13px; cursor:pointer; transition:all 0.2s; font-family:'DM Sans',sans-serif; text-decoration:none; display:inline-flex; align-items:center; }
        .tb-back   { background:rgba(255,255,255,0.15); color:white; }
        .tb-back:hover { background:rgba(255,255,255,0.28); }
        .tb-logout { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; }
        .tb-logout:hover { transform:translateY(-1px); }

        /* ── Grille ── */
        .grid { max-width:1060px; margin:0 auto; display:grid; grid-template-columns:400px 1fr; gap:22px; align-items:start; }
        .col-left  { display:flex; flex-direction:column; gap:22px; }
        .col-right { display:flex; flex-direction:column; gap:22px; }

        /* ── Card ── */
        .card { background:rgba(255,255,255,0.97); border-radius:22px; padding:28px; box-shadow:var(--shadow-lg); animation:fadeInUp 0.45s ease-out backwards; }
        .card:nth-child(1){animation-delay:0.05s;} .card:nth-child(2){animation-delay:0.1s;} .card:nth-child(3){animation-delay:0.15s;}

        .card-title { font-family:'Sora',sans-serif; font-size:17px; font-weight:700; color:var(--dark); margin-bottom:20px; padding-bottom:13px; border-bottom:3px solid var(--primary); position:relative; display:flex; align-items:center; gap:8px; }
        .card-title::after { content:''; position:absolute; bottom:-3px; left:0; width:44px; height:3px; background:var(--secondary); border-radius:10px; }

        /* ── Config GitHub ── */
        .config-status { display:flex; align-items:center; gap:10px; padding:12px 16px; border-radius:12px; font-size:14px; font-weight:600; margin-bottom:18px; }
        .config-ok   { background:rgba(78,205,196,0.12); color:#2a8a85; border:1.5px solid rgba(78,205,196,0.3); }
        .config-warn { background:rgba(255,230,109,0.18); color:#8a6e00; border:1.5px solid rgba(255,230,109,0.4); }

        .config-toggle { font-size:13px; color:#667eea; font-weight:600; cursor:pointer; text-decoration:underline; margin-bottom:14px; display:inline-block; }

        .config-fields { display:none; flex-direction:column; gap:12px; }
        .config-fields.open { display:flex; }

        /* ── Champs ── */
        .field { margin-bottom:14px; }
        .field:last-of-type { margin-bottom:0; }
        .field label { display:block; font-weight:600; font-size:13px; color:#555; margin-bottom:5px; }
        .field input, .field select {
            width:100%; padding:11px 14px; border:2px solid #e8e8f0; border-radius:11px;
            font-size:14px; font-family:'DM Sans',sans-serif; color:var(--dark); outline:none; transition:border-color 0.2s;
        }
        .field input:focus, .field select:focus { border-color:var(--primary); }
        .field-hint { font-size:11px; color:#aaa; margin-top:4px; line-height:1.5; }

        .pwd-wrap { position:relative; }
        .pwd-wrap input { padding-right:44px; }
        .pwd-eye { position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:16px; opacity:0.4; transition:opacity 0.2s; user-select:none; }
        .pwd-eye:hover { opacity:1; }

        /* ── Boutons action ── */
        .form-actions { display:flex; gap:9px; justify-content:flex-end; margin-top:18px; }
        .btn-add {
            padding:11px 24px; border-radius:50px; border:none;
            background:linear-gradient(135deg,var(--primary),var(--primary-dark));
            color:white; font-weight:700; font-size:14px; cursor:pointer; transition:all 0.25s;
            font-family:'DM Sans',sans-serif; display:flex; align-items:center; gap:7px;
        }
        .btn-add:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 16px rgba(255,107,157,0.4); }
        .btn-add:disabled { opacity:0.55; cursor:not-allowed; }
        .btn-cancel-edit { padding:11px 20px; border-radius:50px; border:2px solid #e0e0e8; background:white; color:#666; font-weight:600; font-size:14px; cursor:pointer; font-family:'DM Sans',sans-serif; display:none; }
        .btn-cancel-edit:hover { background:#f5f5fa; }

        /* Spinner dans bouton */
        .spinner { width:15px; height:15px; border:2.5px solid rgba(255,255,255,0.35); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; display:none; }
        .btn-add.loading .spinner { display:block; }
        .btn-add.loading .btn-label { display:none; }

        /* ── Liste utilisateurs ── */
        .user-list { display:flex; flex-direction:column; gap:9px; }
        .user-item {
            display:flex; align-items:center; gap:11px;
            background:#f8f8fc; border-radius:14px; padding:13px 15px;
            border:1.5px solid #eeeef6; transition:all 0.2s;
        }
        .user-item:hover { border-color:rgba(255,107,157,0.25); background:white; }
        .uavatar { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
        .uav-admin { background:linear-gradient(135deg,#667eea,#764ba2); }
        .uav-user  { background:rgba(78,205,196,0.25); }
        .uinfo { flex:1; min-width:0; }
        .uname { font-weight:700; font-size:14px; color:var(--dark); }
        .umeta { font-size:12px; color:#aaa; margin-top:1px; }
        .urole { padding:3px 10px; border-radius:50px; font-size:11px; font-weight:700; text-transform:uppercase; flex-shrink:0; }
        .urole-admin { background:linear-gradient(135deg,#667eea,#764ba2); color:white; }
        .urole-user  { background:rgba(78,205,196,0.18); color:#2a8a85; }
        .ubtns { display:flex; gap:5px; }
        .uact { width:30px; height:30px; border:none; border-radius:8px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
        .uact-e { background:rgba(78,205,196,0.18); color:#2a8a85; }
        .uact-e:hover { background:rgba(78,205,196,0.38); transform:scale(1.1); }
        .uact-d { background:rgba(255,107,157,0.15); color:var(--primary-dark); }
        .uact-d:hover { background:rgba(255,107,157,0.32); transform:scale(1.1); }
        .uact-d:disabled { opacity:0.25; cursor:not-allowed; transform:none; }
        .empty-msg { text-align:center; color:#bbb; padding:18px; font-size:14px; }

        /* ── Déploiement status ── */
        .deploy-log { display:flex; flex-direction:column; gap:8px; }
        .log-item { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:10px; font-size:13px; font-weight:600; }
        .log-pending { background:#f5f5fa; color:#888; border:1.5px solid #eaeaf0; }
        .log-loading { background:rgba(255,230,109,0.15); color:#8a6e00; border:1.5px solid rgba(255,230,109,0.35); }
        .log-success { background:rgba(78,205,196,0.1); color:#2a8a85; border:1.5px solid rgba(78,205,196,0.3); }
        .log-error   { background:rgba(255,107,157,0.1); color:var(--primary-dark); border:1.5px solid rgba(255,107,157,0.3); }
        .log-icon { font-size:16px; flex-shrink:0; }
        .log-spinner { width:14px; height:14px; border:2px solid rgba(138,110,0,0.25); border-top-color:#8a6e00; border-radius:50%; animation:spin 0.7s linear infinite; flex-shrink:0; }

        /* ── Notice config ── */
        .notice {
            background:linear-gradient(135deg,rgba(102,126,234,0.07),rgba(118,75,162,0.07));
            border:1.5px solid rgba(102,126,234,0.2); border-radius:16px; padding:20px 22px;
        }
        .notice h3 { font-family:'Sora',sans-serif; font-size:15px; font-weight:700; color:var(--dark); margin-bottom:14px; }
        .step { display:flex; gap:11px; margin-bottom:13px; }
        .step:last-child { margin-bottom:0; }
        .snum { width:24px; height:24px; border-radius:50%; background:linear-gradient(135deg,#667eea,#764ba2); color:white; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
        .stxt { font-size:13px; color:#444; line-height:1.6; }
        .stxt code { background:#f0f0f8; padding:1px 6px; border-radius:5px; font-family:'Courier New',monospace; font-size:12px; color:#764ba2; }
        .stxt a { color:#667eea; font-weight:600; }

        /* ── Toast ── */
        .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(30px); background:var(--dark); color:white; padding:11px 22px; border-radius:50px; font-weight:600; font-size:14px; box-shadow:var(--shadow-lg); opacity:0; transition:all 0.3s; z-index:2000; pointer-events:none; white-space:nowrap; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

        /* ── Modal ── */
        .modal-ov { display:none; position:fixed; inset:0; background:rgba(26,26,46,0.65); backdrop-filter:blur(8px); z-index:1000; align-items:center; justify-content:center; }
        .modal-ov.open { display:flex; }
        .modal { background:white; border-radius:22px; padding:32px; width:90%; max-width:400px; box-shadow:0 30px 80px rgba(0,0,0,0.28); animation:fadeInUp 0.22s ease-out; }
        .modal h3 { font-family:'Sora',sans-serif; font-size:18px; font-weight:700; color:var(--dark); margin-bottom:10px; }
        .modal p  { font-size:14px; color:#555; line-height:1.6; }
        .modal .mwarn { color:var(--primary-dark); font-size:13px; margin-top:7px; font-weight:600; }
        .modal-actions { display:flex; gap:9px; justify-content:flex-end; margin-top:20px; }
        .mbtn-cancel { padding:10px 20px; border-radius:50px; border:2px solid #e0e0e8; background:white; color:#666; font-weight:600; font-size:13px; cursor:pointer; font-family:'DM Sans',sans-serif; }
        .mbtn-del    { padding:10px 20px; border-radius:50px; border:none; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; font-weight:700; font-size:13px; cursor:pointer; font-family:'DM Sans',sans-serif; display:flex; align-items:center; gap:6px; }
        .mbtn-del:disabled { opacity:0.55; cursor:not-allowed; }

        @media(max-width:780px) {
            .grid { grid-template-columns:1fr; }
            body { padding:80px 14px 50px; }
        }
    </style>
</head>
<body>

<header class="topbar">
    <div class="topbar-title">
        ⚙️ Administration
        <span class="admin-chip" id="adminChip">Admin</span>
    </div>
    <div class="topbar-btns">
        <a class="tb-btn tb-back" href="index.html">← Dashboard</a>
        <button class="tb-btn tb-logout" onclick="logout()">🚪 Déconnexion</button>
    </div>
</header>

<div class="grid">
    <!-- ══ COLONNE GAUCHE ══ -->
    <div class="col-left">

        <!-- Formulaire utilisateur -->
        <div class="card">
            <div class="card-title" id="formTitle">➕ Ajouter un utilisateur</div>

            <div class="field">
                <label>Nom d'utilisateur</label>
                <input type="text" id="fUsername" placeholder="ex : dr.martin" autocomplete="off" spellcheck="false">
            </div>
            <div class="field">
                <label>Mot de passe</label>
                <div class="pwd-wrap">
                    <input type="password" id="fPassword" placeholder="Choisissez un mot de passe" autocomplete="new-password">
                    <span class="pwd-eye" onclick="togglePwd()">👁️</span>
                </div>
                <p class="field-hint" id="pwdHint">Minimum 4 caractères</p>
            </div>
            <div class="field">
                <label>Rôle</label>
                <select id="fRole">
                    <option value="user">👤 Utilisateur — lecture seule</option>
                    <option value="admin">👑 Administrateur — accès complet</option>
                </select>
            </div>

            <div class="form-actions">
                <button class="btn-cancel-edit" id="cancelBtn" onclick="cancelEdit()">Annuler</button>
                <button class="btn-add" id="saveBtn" onclick="saveUser()">
                    <span class="btn-label">➕ Ajouter</span>
                    <span class="spinner"></span>
                </button>
            </div>
        </div>

    </div>

    <!-- ══ COLONNE DROITE ══ -->
    <div class="col-right">

        <!-- Liste utilisateurs -->
        <div class="card">
            <div class="card-title">👥 Utilisateurs (<span id="userCount">0</span>)</div>
            <div class="user-list" id="userList">
                <div class="empty-msg">Chargement…</div>
            </div>
        </div>

        <!-- Log de déploiement -->
        <div class="card" id="deployCard" style="display:none">
            <div class="card-title">🚀 Déploiement en cours</div>
            <div class="deploy-log" id="deployLog"></div>
        </div>

        <!-- Notice config (si token manquant) -->
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Modal suppression -->
<div class="modal-ov" id="delModal">
    <div class="modal">
        <h3>🗑️ Supprimer l'utilisateur</h3>
        <p>Vous êtes sur le point de supprimer <strong id="delTargetName"></strong>.</p>
        <p class="mwarn">Le site sera mis à jour automatiquement en ~1 minute.</p>
        <div class="modal-actions">
            <button class="mbtn-cancel" onclick="closeDelModal()">Annuler</button>
            <button class="mbtn-del" id="delConfirmBtn" onclick="confirmDelete()">
                <span class="btn-label">Supprimer</span>
                <span class="spinner" style="border-color:rgba(255,255,255,0.3);border-top-color:white;"></span>
            </button>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script>
// ══════════════════════════════════════════════════════
//  ÉTAT
// ══════════════════════════════════════════════════════
let users        = [];
let editingIndex = null;
let deletingIndex = null;
let currentUser  = null;

// ══════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════
(function() {
    const s = sessionStorage.getItem('ped_user');
    if (!s) { window.location.replace('login.html'); return; }
    currentUser = JSON.parse(s);
    if (currentUser.role !== 'admin') { window.location.replace('index.html'); return; }
    document.getElementById('adminChip').textContent = '👑 ' + currentUser.username;
})();

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
    // Charger les utilisateurs depuis data.js
    if (typeof PED_USERS !== 'undefined') {
        users = JSON.parse(JSON.stringify(PED_USERS));
    }
    renderUsers();
    loadConfig();
});

// ══════════════════════════════════════════════════════
//  CONFIG GITHUB — lue depuis data.js (PED_GITHUB)
// ══════════════════════════════════════════════════════
function loadConfig() {
    const { token, owner, repo } = getConfig();
    const el     = document.getElementById('configStatus');
    const notice = document.getElementById('noticeCard');
    if (token && token !== 'ghp_VOTRE_TOKEN_ICI' && owner && repo) {
        el.className   = 'config-status config-ok';
        el.textContent = '✅ ' + owner + '/' + repo;
        if (notice) notice.style.display = 'none';
    } else {
        el.className   = 'config-status config-warn';
        el.textContent = '⚠️ Remplissez PED_GITHUB dans data.js';
        if (notice) notice.style.display = 'block';
    }
}

function getConfig() {
    if (typeof PED_GITHUB !== 'undefined') {
        return {
            token: PED_GITHUB.token || '',
            owner: PED_GITHUB.owner || '',
            repo:  PED_GITHUB.repo  || ''
        };
    }
    return { token:'', owner:'', repo:'' };
}

// ══════════════════════════════════════════════════════
//  RENDU LISTE
// ══════════════════════════════════════════════════════
function renderUsers() {
    const list = document.getElementById('userList');
    document.getElementById('userCount').textContent = users.length;
    if (users.length === 0) { list.innerHTML = '<div class="empty-msg">Aucun utilisateur</div>'; return; }
    list.innerHTML = '';
    users.forEach((u, idx) => {
        const isMe = u.username === currentUser.username;
        const d = document.createElement('div');
        d.className = 'user-item';
        d.innerHTML = `
            <div class="uavatar ${u.role === 'admin' ? 'uav-admin' : 'uav-user'}">${u.role === 'admin' ? '👑' : '👤'}</div>
            <div class="uinfo">
                <div class="uname">${escHtml(u.username)}${isMe ? ' <span style="font-size:11px;color:#bbb;font-weight:400">(vous)</span>' : ''}</div>
                <div class="umeta">${u.role === 'admin' ? 'Administrateur' : 'Utilisateur'}</div>
            </div>
            <span class="urole ${u.role === 'admin' ? 'urole-admin' : 'urole-user'}">${u.role === 'admin' ? 'Admin' : 'User'}</span>
            <div class="ubtns">
                <button class="uact uact-e" onclick="startEdit(${idx})" title="Modifier">✏️</button>
                <button class="uact uact-d" onclick="openDelModal(${idx})" title="Supprimer" ${isMe ? 'disabled' : ''}>🗑️</button>
            </div>`;
        list.appendChild(d);
    });
}

// ══════════════════════════════════════════════════════
//  SAUVEGARDE + DÉPLOIEMENT GITHUB
// ══════════════════════════════════════════════════════
async function saveUser() {
    const username = document.getElementById('fUsername').value.trim();
    const password = document.getElementById('fPassword').value.trim();
    const role     = document.getElementById('fRole').value;

    if (!username) { showToast('⚠️ Nom d\'utilisateur requis'); return; }
    if (!password && editingIndex === null) { showToast('⚠️ Mot de passe requis'); return; }
    if (password && password.length < 4)   { showToast('⚠️ Mot de passe trop court'); return; }

    if (editingIndex !== null) {
        const oldName = users[editingIndex].username;
        if (username !== oldName && users.find(u => u.username === username)) {
            showToast('⚠️ Ce nom d\'utilisateur existe déjà'); return;
        }
        users[editingIndex].username = username;
        users[editingIndex].role     = role;
        if (password) users[editingIndex].password = password;
    } else {
        if (users.find(u => u.username === username)) {
            showToast('⚠️ Ce nom d\'utilisateur existe déjà'); return;
        }
        users.push({ username, password, role });
    }

    renderUsers();
    cancelEdit();
    await deployToGitHub();
}

async function confirmDelete() {
    users.splice(deletingIndex, 1);
    renderUsers();
    closeDelModal();
    await deployToGitHub();
}

// ── Cœur : écrit data.js via l'API GitHub (token depuis PED_GITHUB) ──
async function deployToGitHub() {
    const { token, owner, repo } = getConfig();

    if (!token || token === 'ghp_VOTRE_TOKEN_ICI' || !owner || !repo) {
        showToast('⚠️ Remplissez PED_GITHUB dans data.js');
        return;
    }

    const deployCard = document.getElementById('deployCard');
    const deployLog  = document.getElementById('deployLog');
    deployCard.style.display = 'block';
    deployLog.innerHTML = '';
    deployCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    const btn = document.getElementById('saveBtn');
    btn.disabled = true;

    const API_BASE = `https://api.github.com/repos/${owner}/${repo}/contents/data.js`;
    const HEADERS  = {
        'Authorization': `Bearer ${token}`,
        'Accept':        'application/vnd.github+json',
        'Content-Type':  'application/json'
    };

    try {
        // Étape 1 — récupérer le SHA actuel
        addLog('loading', '🔍', 'Lecture de data.js sur GitHub…');
        const getRes = await fetch(API_BASE, { headers: HEADERS });

        if (!getRes.ok) {
            if (getRes.status === 401) throw new Error('Token invalide ou expiré — mettez à jour PED_GITHUB dans data.js');
            if (getRes.status === 404) throw new Error('Dépôt ou fichier introuvable — vérifiez PED_GITHUB dans data.js');
            throw new Error('Erreur GitHub ' + getRes.status);
        }

        const fileData = await getRes.json();
        updateLastLog('success', '✅', 'data.js lu (SHA : ' + fileData.sha.substring(0,7) + '…)');

        // Étape 2 — décoder et remplacer PED_USERS
        addLog('loading', '🔧', 'Mise à jour du bloc utilisateurs…');
        const currentContent = decodeURIComponent(escape(atob(fileData.content.replace(/\n/g, ''))));
        const newContent     = currentContent.replace(
            /const\s+PED_USERS\s*=\s*\[[\s\S]*?\];/m,
            buildUsersBlock()
        );

        if (newContent === currentContent) {
            updateLastLog('success', 'ℹ️', 'Aucun changement détecté');
            btn.disabled = false;
            return;
        }
        updateLastLog('success', '✅', 'Bloc utilisateurs prêt');

        // Étape 3 — push
        addLog('loading', '🚀', 'Envoi vers GitHub…');
        const putRes = await fetch(API_BASE, {
            method:  'PUT',
            headers: HEADERS,
            body: JSON.stringify({
                message: '👥 Mise à jour utilisateurs via page admin',
                content: btoa(unescape(encodeURIComponent(newContent))),
                sha:     fileData.sha
            })
        });

        if (!putRes.ok) {
            const err = await putRes.json();
            throw new Error(err.message || 'Erreur lors du push');
        }

        updateLastLog('success', '✅', 'Envoyé sur GitHub');
        addLog('loading', '⏳', 'GitHub Pages redéploie… (~1 minute)');
        await wait(65000);
        updateLastLog('success', '🎉', 'Site mis à jour !');
        showToast('🎉 Utilisateurs déployés avec succès !');

    } catch (e) {
        updateLastLog('error', '❌', e.message);
        showToast('❌ ' + e.message);
    }

    btn.disabled = false;
}

// ── Construit le bloc const PED_USERS = [...]; ────────
function buildUsersBlock() {
    const lines = ['const PED_USERS = ['];
    users.forEach((u, i) => {
        const comma = i < users.length - 1 ? ',' : '';
        lines.push('    {');
        lines.push(`        username: "${u.username}",`);
        lines.push(`        password: "${u.password}",`);
        lines.push(`        role: "${u.role}"`);
        lines.push('    }' + comma);
    });
    lines.push('];');
    return lines.join('\n');
}

// ══════════════════════════════════════════════════════
//  LOG UI
// ══════════════════════════════════════════════════════
function addLog(type, icon, msg) {
    const log = document.getElementById('deployLog');
    const div = document.createElement('div');
    div.className = 'log-item log-' + type;
    if (type === 'loading') {
        div.innerHTML = `<span class="log-spinner"></span><span>${msg}</span>`;
    } else {
        div.innerHTML = `<span class="log-icon">${icon}</span><span>${msg}</span>`;
    }
    div.dataset.key = Date.now();
    log.appendChild(div);
}

function updateLastLog(type, icon, msg) {
    const log  = document.getElementById('deployLog');
    const last = log.lastElementChild;
    if (!last) return;
    last.className = 'log-item log-' + type;
    last.innerHTML = `<span class="log-icon">${icon}</span><span>${msg}</span>`;
}

// ══════════════════════════════════════════════════════
//  ÉDITION
// ══════════════════════════════════════════════════════
function startEdit(idx) {
    editingIndex = idx;
    const u = users[idx];
    document.getElementById('fUsername').value = u.username;
    document.getElementById('fPassword').value = '';
    document.getElementById('fRole').value     = u.role;
    document.getElementById('formTitle').textContent      = '✏️ Modifier l\'utilisateur';
    document.getElementById('saveBtn').querySelector('.btn-label').textContent = '💾 Enregistrer';
    document.getElementById('cancelBtn').style.display    = 'block';
    document.getElementById('pwdHint').textContent        = 'Laisser vide pour ne pas changer le mot de passe';
    document.getElementById('fUsername').focus();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() {
    editingIndex = null;
    document.getElementById('fUsername').value = '';
    document.getElementById('fPassword').value = '';
    document.getElementById('fRole').value     = 'user';
    document.getElementById('formTitle').textContent      = '➕ Ajouter un utilisateur';
    document.getElementById('saveBtn').querySelector('.btn-label').textContent = '➕ Ajouter';
    document.getElementById('cancelBtn').style.display    = 'none';
    document.getElementById('pwdHint').textContent        = 'Minimum 4 caractères';
}

// ══════════════════════════════════════════════════════
//  MODAL SUPPRESSION
// ══════════════════════════════════════════════════════
function openDelModal(idx) {
    deletingIndex = idx;
    document.getElementById('delTargetName').textContent = users[idx].username;
    document.getElementById('delModal').classList.add('open');
}
function closeDelModal() {
    document.getElementById('delModal').classList.remove('open');
    deletingIndex = null;
}
document.getElementById('delModal').addEventListener('click', e => {
    if (e.target === document.getElementById('delModal')) closeDelModal();
});

// ══════════════════════════════════════════════════════
//  UTILITAIRES
// ══════════════════════════════════════════════════════
function togglePwd() {
    const i = document.getElementById('fPassword');
    i.type = i.type === 'password' ? 'text' : 'password';
}

function showToast(msg, duration = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
}

function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function logout() {
    sessionStorage.removeItem('ped_user');
    window.location.replace('login.html');
}
</script>
