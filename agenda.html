<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info PED — 📆 Agenda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary:#FF6B9D; --primary-light:#FFB4D6;
            --secondary:#4ECDC4; --dark:#1A1A2E;
            --sidebar-bg:#1e1030;
            --sidebar-w:220px;
            --glass-strong:rgba(255,255,255,0.95);
            --glass-border:rgba(255,255,255,0.15);
            --shadow-lg:0 16px 48px rgba(0,0,0,0.18);
            --shadow-glow:0 0 40px rgba(255,107,157,0.3);
        }
        * { margin:0; padding:0; box-sizing:border-box; }

        @keyframes fadeInUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
        @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
        @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}
        @keyframes rotate{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
        @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
        @keyframes gradientShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
        @keyframes slideInLeft{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:translateX(0);}}

        /* ── Layout global ── */
        body {
            font-family:'DM Sans',sans-serif;
            background:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);
            background-size:400% 400%; animation:gradientShift 15s ease infinite;
            min-height:100vh; display:flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            position:fixed; top:0; left:0; bottom:0;
            width:var(--sidebar-w);
            background:var(--sidebar-bg);
            display:flex; flex-direction:column;
            z-index:200; box-shadow:4px 0 24px rgba(0,0,0,0.35);
            overflow:hidden;
        }

        .sidebar-logo {
            padding:28px 20px 20px;
            border-bottom:1px solid rgba(255,255,255,0.08);
        }
        .sidebar-logo a {
            text-decoration:none;
            display:flex; align-items:center; gap:10px;
        }
        .logo-circle {
            width:40px; height:40px; border-radius:12px;
            background:linear-gradient(135deg,#FF6B9D,#764ba2);
            display:flex; align-items:center; justify-content:center;
            font-size:20px; flex-shrink:0;
        }
        .logo-text {
            font-family:'Sora',sans-serif; font-size:14px; font-weight:700;
            color:white; line-height:1.3;
        }
        .logo-sub {
            font-size:11px; color:rgba(255,255,255,0.45); font-weight:400;
        }

        /* Nav items */
        .sidebar-nav {
            flex:1; padding:16px 12px; display:flex; flex-direction:column; gap:4px;
            overflow-y:auto;
        }
        .nav-item {
            display:flex; align-items:center; gap:12px;
            padding:11px 14px; border-radius:12px;
            text-decoration:none; color:rgba(255,255,255,0.6);
            font-size:14px; font-weight:600;
            transition:all 0.2s; position:relative;
        }
        .nav-item:hover {
            background:rgba(255,255,255,0.08);
            color:rgba(255,255,255,0.9);
        }
        .nav-item.active {
            background:linear-gradient(135deg,rgba(255,107,157,0.25),rgba(118,75,162,0.25));
            color:white;
            box-shadow:inset 0 0 0 1px rgba(255,107,157,0.3);
        }
        .nav-item.active::before {
            content:'';
            position:absolute; left:0; top:20%; bottom:20%;
            width:3px; border-radius:0 3px 3px 0;
            background:linear-gradient(to bottom,#FF6B9D,#764ba2);
        }
        .nav-icon { font-size:18px; width:24px; text-align:center; flex-shrink:0; }
        .nav-label { flex:1; }

        /* Sidebar bottom */
        .sidebar-bottom {
            padding:16px 12px;
            border-top:1px solid rgba(255,255,255,0.08);
            display:flex; flex-direction:column; gap:8px;
        }
        .sidebar-user {
            display:flex; align-items:center; gap:10px;
            padding:10px 12px; border-radius:12px;
            background:rgba(255,255,255,0.06);
        }
        .user-avatar {
            width:34px; height:34px; border-radius:50%;
            background:linear-gradient(135deg,#FF6B9D,#764ba2);
            display:flex; align-items:center; justify-content:center;
            font-size:15px; flex-shrink:0;
        }
        .user-info { min-width:0; }
        .user-name { font-size:13px; font-weight:700; color:white; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .user-role { font-size:11px; color:rgba(255,255,255,0.4); }

        .sidebar-btn {
            display:flex; align-items:center; gap:10px;
            padding:10px 14px; border-radius:12px; border:none;
            font-size:13px; font-weight:600; cursor:pointer;
            transition:all 0.2s; font-family:'DM Sans',sans-serif;
            text-align:left; width:100%;
        }
        .btn-edit-side {
            background:rgba(78,205,196,0.15); color:#4ECDC4;
            display:none;
        }
        .btn-edit-side.active {
            background:rgba(255,230,109,0.15); color:#FFE66D;
        }
        .btn-edit-side:hover { background:rgba(78,205,196,0.28); }
        .btn-logout-side {
            background:rgba(255,107,157,0.12); color:#FF6B9D;
        }
        .btn-logout-side:hover { background:rgba(255,107,157,0.25); }

        .sidebar-home {
            display:flex; align-items:center; gap:10px;
            padding:10px 14px; border-radius:12px;
            text-decoration:none; color:rgba(255,255,255,0.5);
            font-size:13px; font-weight:600; transition:all 0.2s;
        }
        .sidebar-home:hover { background:rgba(255,255,255,0.07); color:white; }

        /* ── Contenu principal ── */
        .main-content {
            margin-left:var(--sidebar-w);
            flex:1; min-height:100vh;
            padding:36px 40px 80px;
            position:relative; z-index:1;
        }

        .page-header {
            margin-bottom:32px;
            animation:fadeInUp 0.5s ease-out;
        }
        .page-header-top {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:6px; flex-wrap:wrap; gap:12px;
        }
        .page-h1 {
            font-family:'Sora',sans-serif;
            font-size:clamp(26px,4vw,42px); font-weight:800;
            color:white; text-shadow:0 4px 20px rgba(0,0,0,0.3);
        }
        .page-sub {
            font-size:13px; color:rgba(255,255,255,0.5); font-weight:500;
        }

        /* ── Bloc contenu ── */
        .content-card {
            background:var(--glass-strong);
            backdrop-filter:blur(30px);
            border:1px solid var(--glass-border);
            border-radius:24px; padding:32px;
            box-shadow:var(--shadow-lg);
            animation:fadeInUp 0.5s ease-out 0.1s backwards;
        }
        .block-medicaments{background:linear-gradient(135deg,rgba(255,136,154,0.95),rgba(255,184,214,0.95));border:1px solid rgba(255,107,157,0.3);}
        .block-hygiene{background:linear-gradient(135deg,rgba(78,205,196,0.95),rgba(163,230,226,0.95));border:1px solid rgba(78,205,196,0.3);}
        .block-rh{background:linear-gradient(135deg,rgba(224,191,211,0.95),rgba(238,217,232,0.95));border:1px solid rgba(224,191,211,0.3);}
        .block-divers{background:linear-gradient(135deg,rgba(255,230,109,0.95),rgba(255,243,176,0.95));border:1px solid rgba(255,230,109,0.3);}

        /* ── Liste ── */
        ul { list-style:none; padding:0; }
        ul li {
            padding:14px 0; font-size:15px; color:#1A1A2E;
            position:relative; padding-left:25px;
            transition:all 0.2s; border-bottom:1px solid rgba(0,0,0,0.06);
        }
        ul li:last-child { border-bottom:none; }
        ul li::before { content:'▸'; position:absolute; left:0; color:var(--primary); font-weight:bold; transition:transform 0.2s; }
        ul li:hover { padding-left:30px; }
        ul li:hover::before { transform:translateX(5px); }
        ul li.with-button { display:flex; justify-content:space-between; align-items:center; }
        ul li.with-button button {
            background:linear-gradient(135deg,var(--primary),var(--primary-light));
            border:none; border-radius:50px; color:white; font-weight:700; font-size:18px;
            padding:8px 16px; cursor:pointer; transition:all 0.3s;
        }
        ul li.with-button button:hover { transform:scale(1.1) rotate(5deg); }

        .alert-item {
            background:linear-gradient(135deg,rgba(255,107,157,0.15),rgba(255,184,214,0.15));
            border-left:4px solid var(--primary);
            padding:15px 15px 15px 55px !important;
            border-radius:12px; margin:8px 0;
            position:relative; animation:pulse 2s ease-in-out infinite;
        }
        .alert-item .icon { position:absolute; left:15px; top:50%; transform:translateY(-50%); font-size:20px; }
        .alert-item .text { font-weight:600; color:#1A1A2E; }

        /* ── Agenda ── */
        .agenda-item {
            display:flex; flex-direction:column;
            background:rgba(255,255,255,0.6); border-radius:16px;
            padding:16px; margin-bottom:12px;
            transition:all 0.3s; border:1px solid rgba(255,255,255,0.4);
        }
        .agenda-item:hover { background:rgba(255,255,255,0.85); transform:translateX(4px); }
        .agenda-header { display:flex; align-items:center; gap:15px; cursor:pointer; }
        .agenda-date { background:linear-gradient(135deg,var(--primary),#C94A6D); border-radius:12px; padding:8px 14px; text-align:center; min-width:60px; }
        .agenda-date .day { display:block; font-family:'Sora',sans-serif; font-size:24px; font-weight:800; color:white; line-height:1; }
        .agenda-date .month { display:block; font-size:11px; font-weight:600; color:rgba(255,255,255,0.85); text-transform:uppercase; }
        .agenda-main { flex:1; display:flex; justify-content:space-between; align-items:center; }
        .agenda-content { font-size:16px; font-weight:600; color:#1A1A2E; }
        .agenda-arrow { font-size:18px; color:var(--primary); transition:transform 0.3s; }
        .agenda-item.expanded .agenda-arrow { transform:rotate(90deg); }
        .agenda-details { max-height:0; overflow:hidden; transition:max-height 0.4s cubic-bezier(0.4,0,0.2,1),opacity 0.3s,margin-top 0.3s; opacity:0; margin-top:0; }
        .agenda-item.expanded .agenda-details { max-height:300px; opacity:1; margin-top:14px; }
        .agenda-details-content { background:rgba(255,255,255,0.5); border-radius:12px; padding:16px; border-left:3px solid var(--primary); }
        .detail-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; font-size:14px; color:#1A1A2E; }
        .detail-row:last-child { margin-bottom:0; }
        .detail-icon { font-size:16px; width:24px; text-align:center; }
        .detail-label { font-weight:700; min-width:100px; }
        .detail-value { color:#555; }

        /* ── Mode édition ── */
        body.edit-mode .content-card { outline:2px dashed rgba(255,107,157,0.5); outline-offset:3px; }
        body.edit-mode .agenda-item { outline:2px dashed rgba(255,107,157,0.35); outline-offset:1px; }
        .edit-actions { display:none; position:absolute; right:6px; top:50%; transform:translateY(-50%); gap:4px; z-index:10; }
        body.edit-mode ul li { padding-right:72px; }
        body.edit-mode .edit-actions { display:flex; }
        .eact { width:28px; height:28px; border:none; border-radius:8px; cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
        .eact-e { background:rgba(78,205,196,0.8); color:white; }
        .eact-e:hover { background:#4ECDC4; transform:scale(1.1); }
        .eact-d { background:rgba(255,107,157,0.8); color:white; }
        .eact-d:hover { background:#FF6B9D; transform:scale(1.1); }
        .agenda-edit-btns { display:none; gap:5px; }
        body.edit-mode .agenda-edit-btns { display:flex; }

        .add-btn {
            display:none; width:100%; padding:11px;
            margin-bottom:16px;
            border:2px dashed rgba(255,107,157,0.5); border-radius:12px;
            background:rgba(255,107,157,0.07); color:var(--primary);
            font-weight:700; font-size:14px; cursor:pointer;
            transition:all 0.2s; font-family:'DM Sans',sans-serif;
        }
        .add-btn:hover { background:rgba(255,107,157,0.16); }

        /* ── Infos bas ── */
        #last-update {
            position:fixed; bottom:20px; left:calc(var(--sidebar-w) + 20px);
            background:rgba(30,16,48,0.85); backdrop-filter:blur(16px);
            padding:9px 18px; border-radius:50px;
            font-weight:600; font-size:12px; color:rgba(255,255,255,0.6);
            border:1px solid rgba(255,255,255,0.1); z-index:100;
        }
        #last-update span { color:#FF6B9D; }

        .toast {
            position:fixed; bottom:70px; left:50%; transform:translateX(-50%) translateY(30px);
            background:#1A1A2E; color:white; padding:11px 22px; border-radius:50px;
            font-weight:600; font-size:14px; box-shadow:var(--shadow-lg);
            opacity:0; transition:all 0.3s; z-index:2000; pointer-events:none; white-space:nowrap;
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

        /* ── Responsive ── */
        @media(max-width:768px) {
            .sidebar { width:64px; }
            .nav-label,.logo-text,.logo-sub,.user-info,.sidebar-btn span:not(.btn-icon) { display:none; }
            .main-content { margin-left:64px; padding:20px 16px 80px; }
            #last-update { left:80px; }
            :root { --sidebar-w:64px; }
        }
    </style>
</head>
<body>

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <a href="index.html">
                <div class="logo-circle">🏥</div>
                <div class="logo-text">
                    Les InfoPED
                    <div class="logo-sub">Pédiatrie</div>
                </div>
            </a>
        </div>

        <nav class="sidebar-nav">
                <a href="medicaments.html" class="nav-item">
                    <span class="nav-icon">💊</span>
                    <span class="nav-label">Médicaments</span>
                </a>
                <a href="hygiene.html" class="nav-item">
                    <span class="nav-icon">🦠</span>
                    <span class="nav-label">Hygiène</span>
                </a>
                <a href="projets.html" class="nav-item">
                    <span class="nav-icon">💡</span>
                    <span class="nav-label">Projets</span>
                </a>
                <a href="rh.html" class="nav-item">
                    <span class="nav-icon">👥</span>
                    <span class="nav-label">RH</span>
                </a>
                <a href="divers.html" class="nav-item">
                    <span class="nav-icon">📋</span>
                    <span class="nav-label">Divers</span>
                </a>
                <a href="agenda.html" class="nav-item active">
                    <span class="nav-icon">📆</span>
                    <span class="nav-label">Agenda</span>
                </a>
                <a href="evenements.html" class="nav-item">
                    <span class="nav-icon">🎉</span>
                    <span class="nav-label">Évènements</span>
                </a>
        </nav>

        <div class="sidebar-bottom">
            <a class="sidebar-home" href="index.html">
                <span>🏠</span><span>Accueil</span>
            </a>
            <button class="sidebar-btn btn-edit-side" id="editBtn" onclick="toggleEdit()">
                <span>✏️</span><span id="editBtnLabel">Mode édition</span>
            </button>
            <div class="sidebar-user" id="sidebarUser">
                <div class="user-avatar" id="userAvatar">👤</div>
                <div class="user-info">
                    <div class="user-name" id="userName">—</div>
                    <div class="user-role" id="userRole">—</div>
                </div>
            </div>
            <button class="sidebar-btn btn-logout-side" onclick="pedLogout()">
                <span>🚪</span><span>Déconnexion</span>
            </button>
        </div>
    </aside>

    <!-- ── Contenu ── -->
    <main class="main-content">
        <div class="page-header">
            <div class="page-header-top">
                <h1 class="page-h1">📆 Agenda</h1>
            </div>
            <div class="page-sub" id="lastModified">—</div>
        </div>

        <div class="content-card ">

                <button class="add-btn add-agenda-btn" id="addAgendaBtn" style="display:none" onclick="pedOpenAddAgenda()">+ Ajouter un évènement</button>
                <div id="agenda-list"></div>
        </div>
    </main>

    <div id="last-update">🕒 <span id="lastModifiedFull"></span></div>
    <div class="toast" id="pedToast"></div>

    <script src="data.js"></script>
    <script src="shared.js"></script>
    <script>
    const currentUser = pedGetUser();
    if (!currentUser) window.location.replace('login.html');

    let isEditMode = false;
    let localContent = null;
    let localAgenda  = null;

    document.addEventListener('DOMContentLoaded', function() {
        const isAdmin = currentUser.role === 'admin';

        // User info dans sidebar
        document.getElementById('userName').textContent   = currentUser.username;
        document.getElementById('userRole').textContent   = isAdmin ? '👑 Admin' : (currentUser.role === 'guest' ? '👁️ Invité' : '👤 Utilisateur');
        document.getElementById('userAvatar').textContent = isAdmin ? '👑' : (currentUser.role === 'guest' ? '👁️' : '👤');

        // Date màj
        const ds = typeof PED_LAST_UPDATE !== 'undefined' ? PED_LAST_UPDATE : '—';
        document.getElementById('lastModified').textContent     = 'Dernière mise à jour : ' + ds;
        document.getElementById('lastModifiedFull').textContent = ds;

        // Bouton édition visible pour admins
        if (isAdmin) document.getElementById('editBtn').style.display = 'flex';

        localContent = JSON.parse(JSON.stringify(PED_CONTENT));
        if (!localContent.evenements) localContent.evenements = [];
        localAgenda  = JSON.parse(JSON.stringify(PED_AGENDA || []));
        pedInitEdit(localContent, localAgenda, renderPage);
        renderPage();
    });

    function renderPage() {
        const isAdmin = currentUser.role === 'admin' && isEditMode;
        pedRenderAgenda('agenda-list', localAgenda, isAdmin);
    }

    function toggleEdit() {
        isEditMode = !isEditMode;
        document.body.classList.toggle('edit-mode', isEditMode);
        const btn   = document.getElementById('editBtn');
        const label = document.getElementById('editBtnLabel');
        btn.classList.toggle('active', isEditMode);
        label.textContent = isEditMode ? 'Terminer' : 'Mode édition';
        const addBtn = document.getElementById('addItemBtn') || document.getElementById('addAgendaBtn');
        if (addBtn) addBtn.style.display = isEditMode ? 'block' : 'none';
        renderPage();
        if (isEditMode) pedToast('✏️ Mode édition activé');
    }
    </script>
</body>
</html>
